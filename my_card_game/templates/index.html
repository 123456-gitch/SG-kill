<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>三国kill 游戏界面</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        body { background-color: #1a1a1a; color: #fff; font-family: 'Microsoft YaHei', sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 2.2fr 1fr; gap: 20px; }
        .main-panel, .side-panel { background: #2a2a2a; padding: 20px; border-radius: 12px; border: 1px solid #444; }
        
        .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 2px solid #ff9800; padding-bottom: 10px; }
        .rule-btn { background: #00adb5; color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .reset-btn { background: #d9534f; color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-left: 10px; }
        
        .lobby-box { background: #333; padding: 25px; border-radius: 8px; border: 2px dashed #00adb5; text-align: center; margin-bottom: 25px; }
        .lobby-input-group { display: flex; gap: 10px; max-width: 600px; margin: 15px auto; }
        .lobby-input { flex: 1; padding: 10px; background: #111; color: #fff; border: 1px solid #555; border-radius: 4px; font-size: 14px; }
        
        .player-card { background: #3a3a3a; padding: 12px; margin: 10px 0; border-radius: 8px; cursor: pointer; border: 2.5px solid transparent; transition: all 0.2s ease-in-out; }
        .player-card.active-turn { border-color: #ff9800; background: #382d22; }
        .player-card.selected-target { border-color: #e91e63 !important; box-shadow: 0 0 15px #e91e63; background: #4a1525 !important; }
        .player-card.dead { opacity: 0.4; filter: grayscale(100%); pointer-events: none; }
        
        .section-title { font-size: 15px; color: #ff9800; border-left: 4px solid #ff9800; padding-left: 8px; margin: 15px 0 10px 0; }
        .hand-area { display: flex; gap: 10px; flex-wrap: wrap; background: #222; padding: 10px; border-radius: 8px; min-height: 50px; }
        
        .card { background: #4e3629; border: 2px solid #8b5a2b; width: 95px; height: 135px; border-radius: 8px; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; font-weight: bold; font-size: 14px; transition: 0.2s; text-align: center; user-select: none; }
        .card:hover { transform: translateY(-8px); box-shadow: 0 5px 12px rgba(255,152,0,0.3); }
        .card.status-card-item { background: #283e56; border-color: #00adb5; color: #e0f7fa; }
        
        .response-box, .beishui-box { background: #3c2415; border: 2px solid #ff5722; padding: 15px; border-radius: 8px; margin: 15px 0; display: none; }
        .btn { padding: 8px 16px; margin: 5px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
        .btn-action { background: #ff9800; color: white; }
        .btn-danger { background: #d9534f; color: white; }
        .btn-status { background: #00adb5; color: white; }
        
        .log-box { background: #111; height: 530px; overflow-y: auto; padding: 10px; border-radius: 6px; font-family: monospace; font-size: 12px; line-height: 1.7; border: 1px solid #333; }
        
        .modal { display: none; position: fixed; z-index: 999; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); }
        .modal-content { background: #222; margin: 3% auto; padding: 25px; width: 85%; max-width: 850px; border-radius: 12px; border: 2px solid #444; max-height: 85vh; overflow-y: auto; }
        .close { color: #aaa; float: right; font-size: 28px; font-weight: bold; cursor: pointer; }
        .rule-table { width: 100%; border-collapse: collapse; margin-top: 10px; color: #ddd; margin-bottom: 20px; }
        .rule-table th, .rule-table td { border: 1px solid #444; padding: 8px; text-align: left; font-size: 13px; }
        .rule-table th { background: #111; color: #ff9800; }
    </style>
</head>
<body>

<div class="container">
    <div class="main-panel">
        <div class="header-bar">
            <h2>三国kill ⚔️</h2>
            <div>
                <button class="rule-btn" onclick="openRules()">查看卡牌说明与规则</button>
                <button class="reset-btn" onclick="triggerForceReset()">强制重置房间</button>
            </div>
        </div>
        
        <div id="lobby-area" class="lobby-box">
            <h3 style="color: #00adb5; margin-top: 0;">⚔️ 联机准备大厅 ⚔️</h3>
            <div id="lobby-status" style="font-size: 15px; color: #ff9800; margin-bottom: 10px;">正在载入连接状态...</div>
            
            <div id="lobby-controls" class="lobby-input-group">
                <input type="text" id="nickname-input" class="lobby-input" placeholder="输入玩家昵称..." />
                
                <select id="bot-count-select" class="lobby-input" onchange="changeBotCount()">
                    <option value="0">不需要人机 (满3位真人开局)</option>
                    <option value="1">需要 1 个人机 (满2位真人即开)</option>
                    <option value="2">需要 2 个人机 (仅需1位真人即开)</option>
                </select>
                
                <button class="btn btn-status" id="join-room-btn" onclick="joinRoomAction()">确认加入房间</button>
            </div>
            
            <div id="lobby-players-list" style="margin-top: 20px; font-size: 14px; background: #222; padding: 12px; border-radius: 6px; color: #ddd;">
                等待玩家入座...
            </div>
        </div>

        <div id="game-play-area" style="display: none;">
            <div id="round-info" style="font-size:14px; color:#ff9800; margin-bottom:15px; font-weight:bold;">正在读取游戏数据...</div>
            
            <div class="section-title">👥 存活玩家列表（请点击选择一个目标玩家进行出牌）</div>
            <div id="players-list"></div>

            <div id="beishui-area" class="beishui-box">
                <h3 style="margin-top:0; color:#00adb5;">【背水一战】效果选择</h3>
                <p>选择本回合开始前失去多少点生命值以换取等量+1的自残摸牌：</p>
                <div style="margin-bottom: 10px;">
                    失去生命值: <input type="number" id="beishui-val" min="0" value="0" style="width: 60px; padding: 4px;"> 点 
                </div>
                <button class="btn btn-status" onclick="submitBeishui()">确认</button>
            </div>

            <div id="response-area" class="response-box">
                <h4 id="response-tips" style="margin-top:0; color:#ff5722;"></h4>
                <div id="response-buttons"></div>
            </div>

            <div class="section-title">🔮 状态手牌区（需点击装备才生效）</div>
            <div id="status-hand" class="hand-area"></div>

            <div class="section-title">🎴 基本牌手牌（回合结束自动补全5张）</div>
            <div id="my-hand" class="hand-area"></div>
            
            <div style="margin-top: 25px;">
                <button class="btn btn-danger" style="font-size:14px; padding:10px 22px;" onclick="endTurn()">结束我的出牌阶段</button>
            </div>
        </div>
    </div>

    <div class="side-panel">
        <h3 style="color:#ff9800; margin-top:0;">战局动态日志</h3>
        <div id="log" class="log-box"></div>
    </div>
</div>

<div id="ruleModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeRules()">&times;</span>
        <h2 style="color:#ff9800;">三国kill 游戏卡牌效果说明</h2>
        <h3>核心规则与卡牌池完整同上</h3>
    </div>
</div>

<script>
    const socket = io();
    let selectedTargetIdx = -1;

    socket.on('connect', () => { 
        document.getElementById('lobby-status').innerText = "已成功接入中央服务器！可在下方调整人机并输入名字加入。";
    });

    socket.on('action_error', (data) => { alert(data.msg); });

    socket.on('force_reload_all', () => {
        alert("房间被强制重置，正在重新返回大厅...");
        location.reload();
    });

    // 监听大厅状态改变
    socket.on('lobby_update', (data) => {
        document.getElementById('lobby-area').style.display = 'block';
        document.getElementById('game-play-area').style.display = 'none';
        
        // 动态计算还差几名真人
        document.getElementById('bot-count-select').value = data.bot_count;
        const humansNeeded = 3 - data.count - data.bot_count;
        document.getElementById('lobby-status').innerText = `当前已入座真人：${data.count} 人 | 预留人机：${data.bot_count} 个 | 还需要真人：${humansNeeded < 0 ? 0 : humansNeeded} 人`;
        
        const formatPlayers = data.players.map((p, i) => `<strong>[座位 ${i+1}]</strong> <span style="color:#00adb5;">${p.name}</span>`).join(' &nbsp;&nbsp;|&nbsp;&nbsp; ');
        document.getElementById('lobby-players-list').innerHTML = data.count > 0 ? `当前席位：${formatPlayers}` : "当前席位空无一人，请速速入座！";
    });

    // 大厅修改人机数量事件
    function changeBotCount() {
        const bc = document.getElementById('bot-count-select').value;
        socket.emit('change_bot_count', { bot_count: bc });
    }

    socket.on('game_update', (data) => {
        document.getElementById('lobby-area').style.display = 'none';
        document.getElementById('game-play-area').style.display = 'block';

        const activeP = data.players.find(p => p.idx === data.current_idx);
        document.getElementById('round-info').innerHTML = `当前：第 ${data.round} 轮 | 当前回弹出牌者：<span style='color:#00adb5;'>${activeP ? activeP.name : '未知'}</span> | 剩余行动力：<strong>${data.actions_left}</strong> 次 | 剩余牌库：${data.deck_count} 张`;

        const listDiv = document.getElementById('players-list');
        listDiv.innerHTML = '';
        data.players.forEach(p => {
            const pDiv = document.createElement('div');
            pDiv.className = `player-card ${p.idx === data.current_idx ? 'active-turn' : ''} ${selectedTargetIdx === p.idx ? 'selected-target' : ''} ${!p.alive ? 'dead' : ''}`;
            
            let cdTips = p.status_cooldown > 0 ? ` (冷却中:${p.status_cooldown}门)` : " (就绪)";
            if(p.status === "正常") cdTips = "";

            pDiv.innerHTML = `
                <strong>${p.name}</strong><br>
                阵营：<span>${p.faction}</span> | 装备栏：<span>【${p.status}】${cdTips}</span><br>
                健康值：<strong>${p.hp} / ${p.max_hp}</strong> | 存余手牌：${p.hand_count} 张
            `;
            if(p.alive) {
                pDiv.onclick = () => {
                    selectedTargetIdx = p.idx;
                    document.querySelectorAll('.player-card').forEach(el => el.classList.remove('selected-target'));
                    pDiv.classList.add('selected-target');
                };
            }
            listDiv.appendChild(pDiv);
        });

        const beishuiArea = document.getElementById('beishui-area');
        beishuiArea.style.display = data.is_beishui_prompt ? 'block' : 'none';

        const respArea = document.getElementById('response-area');
        if (data.is_my_response) {
            respArea.style.display = 'block';
            const tips = document.getElementById('response-tips');
            const btns = document.getElementById('response-buttons');
            btns.innerHTML = '';

            const myStatus = data.my_status;
            const hasWall = data.my_cards.includes("长城");
            const hasDef = data.my_cards.includes("防");
            const hasAttack = data.my_cards.includes("攻");

            if (data.pending_card === "攻") {
                tips.innerHTML = `⚠️ 警告！遭受到来自对手的【攻】！打出【防】反击或打出【长城】全免疫。`;
                if (hasDef) btns.innerHTML += `<button class="btn btn-action" onclick="respond('防')">回应【防】</button>`;
                if (myStatus === "暗度陈仓" && hasAttack) btns.innerHTML += `<button class="btn btn-status" onclick="respond('攻_as_防')">暗度陈仓：将【攻】化为【防】</button>`;
            } else if (data.pending_card === "荆轲刺秦") {
                tips.innerHTML = `⚠️ 杀机！对方使出【荆轲刺秦】（需追加 ${data.required_defenses} 张【防】抵御）或消耗【长城】拦截。`;
                if (hasDef) btns.innerHTML += `<button class="btn btn-action" onclick="respond('防')">回应【防】</button>`;
                if (myStatus === "暗度陈仓" && hasAttack) btns.innerHTML += `<button class="btn btn-status" onclick="respond('攻_as_防')">暗度陈仓：将【攻】化为【防】</button>`;
            } else {
                tips.innerHTML = `💥 锦囊袭来！对方对你倾泻了【${data.pending_card}】！可交出【长城】反弹，否则生效。`;
            }

            if (hasWall) {
                btns.innerHTML += `<button class="btn btn-status" style="background:#4caf50;" onclick="respond('长城')">打出【长城】(全牌免疫)</button>`;
            }
            btns.innerHTML += `<button class="btn btn-danger" onclick="respond('放弃')">放弃抵抗(生吃伤害/效果)</button>`;
        } else {
            respArea.style.display = 'none';
        }

        // 刷新状态手牌
        const statusHandArea = document.getElementById('status-hand');
        statusHandArea.innerHTML = '';
        data.my_status_cards.forEach(card => {
            const sDiv = document.createElement('div');
            sDiv.className = 'card status-card-item';
            sDiv.innerText = card;
            sDiv.onclick = () => { socket.emit('equip_status', { card: card }); };
            statusHandArea.appendChild(sDiv);
        });

        // 刷新普通手牌
        const handArea = document.getElementById('my-hand');
        handArea.innerHTML = '';
        data.my_cards.forEach(cardName => {
            const cDiv = document.createElement('div');
            cDiv.className = 'card';
            cDiv.innerText = cardName;
            cDiv.onclick = () => {
                if (cardName === "防") {
                    if (data.my_status === "暗度陈仓") {
                        if (selectedTargetIdx === -1) { alert("请先在上方列表选定目标玩家！"); return; }
                        socket.emit('play_card', { card: cardName, target: selectedTargetIdx, intent: '攻' });
                    } else {
                        alert("【防】属于被动响应牌，无法直接主动扔出。");
                    }
                    return;
                }
                if (["攻", "荆轲刺秦", "一字马", "顺手牵羊", "江山易主", "同归于尽"].includes(cardName)) {
                    if (selectedTargetIdx === -1) { alert("请先在上方列表选定目标玩家！"); return; }
                }
                socket.emit('play_card', { card: cardName, target: selectedTargetIdx });
            };
            handArea.appendChild(cDiv);
        });
    });

    socket.on('log', (data) => {
        const box = document.getElementById('log');
        box.innerHTML += `<div>${data.msg}</div>`;
        box.scrollTop = box.scrollHeight;
    });

    function joinRoomAction() {
        const nameVal = document.getElementById('nickname-input').value.trim();
        if (!nameVal) { alert("请起个响亮的英豪花名！"); return; }
        socket.emit('join_game', { name: nameVal });
        document.getElementById('nickname-input').disabled = true;
        document.getElementById('bot-count-select').disabled = true;
        document.getElementById('join-room-btn').style.display = 'none';
    }

    function triggerForceReset() {
        if(confirm("确定清空数据并强退所有人重回大厅吗？")) { socket.emit('reset_game'); }
    }
    function submitBeishui() {
        const val = document.getElementById('beishui-val').value;
        socket.emit('beishui_decision', { sacrifice: val });
    }
    function respond(type) { socket.emit('respond_action', { type: type }); }
    function endTurn() { selectedTargetIdx = -1; socket.emit('end_turn'); }
    function openRules() { document.getElementById('ruleModal').style.display = 'block'; }
    function closeRules() { document.getElementById('ruleModal').style.display = 'none'; }
</script>
</body>
</html>
