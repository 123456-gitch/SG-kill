<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>三国kill</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #1a1a2e; 
            color: #e0e0e0; 
            font-family: "微软雅黑", sans-serif;
            height: 100vh;
            overflow: hidden;
        }
        .lobby {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
        }
        .lobby h1 {
            font-size: 48px;
            color: #e94560;
            text-shadow: 0 0 10px rgba(233,69,96,0.5);
            margin-bottom: 20px;
        }
        .lobby input {
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 8px;
            border: 1px solid #e94560;
            background: #16213e;
            color: #fff;
            width: 240px;
        }
        .lobby button {
            padding: 12px 40px;
            font-size: 18px;
            border-radius: 8px;
            border: none;
            background: #e94560;
            color: #fff;
            cursor: pointer;
            transition: 0.2s;
        }
        .lobby button:hover { background: #ff6b81; }
        .bot-setting {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .game {
            display: none;
            height: 100vh;
            padding: 20px;
            flex-direction: column;
        }
        .game-top {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .round-info {
            font-size: 18px;
            color: #f5c518;
        }
        .deck-info {
            font-size: 14px;
            color: #999;
        }

        .players-area {
            flex: 1;
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-bottom: 20px;
        }
        .player-card {
            width: 180px;
            padding: 15px;
            border-radius: 10px;
            background: #16213e;
            border: 2px solid #0f3460;
            text-align: center;
            position: relative;
            transition: 0.2s;
            cursor: pointer;
        }
        .player-card.current {
            border-color: #f5c518;
            box-shadow: 0 0 15px rgba(245,197,24,0.4);
        }
        .player-card.dead {
            opacity: 0.4;
            filter: grayscale(1);
        }
        .player-card.selected {
            border-color: #e94560;
            box-shadow: 0 0 15px rgba(233,69,96,0.6);
        }
        .player-name {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 8px;
        }
        .hp-bar {
            height: 8px;
            background: #333;
            border-radius: 4px;
            margin-bottom: 8px;
            overflow: hidden;
        }
        .hp-fill {
            height: 100%;
            background: #e94560;
            transition: 0.3s;
        }
        .hp-text {
            font-size: 12px;
            margin-bottom: 6px;
        }
        .faction {
            font-size: 12px;
            color: #f5c518;
            margin-bottom: 6px;
        }
        .status-tag {
            display: inline-block;
            padding: 2px 6px;
            font-size: 11px;
            border-radius: 4px;
            background: #0f3460;
            color: #5cc2f5;
        }
        .hand-count {
            font-size: 12px;
            color: #999;
            margin-top: 6px;
        }

        .my-area {
            background: #16213e;
            border-radius: 10px;
            padding: 15px;
        }
        .my-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .actions {
            color: #f5c518;
            font-weight: bold;
        }
        .end-turn-btn {
            padding: 8px 20px;
            background: #e94560;
            border: none;
            border-radius: 6px;
            color: #fff;
            cursor: pointer;
        }
        .end-turn-btn:disabled {
            background: #555;
            cursor: not-allowed;
        }

        .status-cards {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }
        .status-card {
            padding: 8px 12px;
            background: #0f3460;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            border: 1px solid transparent;
        }
        .status-card:hover { border-color: #5cc2f5; }

        .hand-cards {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            min-height: 100px;
        }
        .card {
            width: 70px;
            height: 100px;
            background: linear-gradient(135deg, #2d4263, #16213e);
            border: 2px solid #0f3460;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
            user-select: none;
        }
        .card:hover {
            transform: translateY(-10px);
            border-color: #f5c518;
        }
        .card.attack { color: #ff8a8a; }
        .card.defense { color: #8ac4ff; }
        .card.skill { color: #c58aff; }

        .log-area {
            position: fixed;
            right: 20px;
            top: 80px;
            width: 280px;
            height: 400px;
            background: rgba(22,33,62,0.9);
            border-radius: 8px;
            padding: 10px;
            overflow-y: auto;
            font-size: 12px;
            line-height: 1.8;
        }
        .log-area::-webkit-scrollbar { width: 4px; }
        .log-area::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

        /* 弹窗 */
        .modal-mask {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }
        .modal {
            background: #16213e;
            padding: 30px;
            border-radius: 10px;
            min-width: 300px;
            text-align: center;
        }
        .modal h3 {
            margin-bottom: 20px;
            color: #f5c518;
        }
        .modal-btns {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .modal-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            background: #e94560;
            color: #fff;
            cursor: pointer;
        }
        .modal-btn.secondary { background: #0f3460; }
        .modal-btn:disabled { background: #555; cursor: not-allowed; }

        .reset-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 8px 16px;
            background: #555;
            border: none;
            border-radius: 6px;
            color: #fff;
            cursor: pointer;
            font-size: 12px;
        }
    </style>
</head>
<body>

<!-- 大厅 -->
<div class="lobby" id="lobby">
    <h1>三国kill</h1>
    <input type="text" id="playerName" placeholder="输入你的名字" maxlength="10">
    <div class="bot-setting">
        <span>人机数量：</span>
        <button onclick="changeBot(-1)">-</button>
        <span id="botCount">2</span>
        <button onclick="changeBot(1)">+</button>
    </div>
    <button onclick="joinGame()">开始游戏</button>
    <div id="lobbyInfo">等待中...</div>
</div>

<!-- 游戏界面 -->
<div class="game" id="game">
    <div class="game-top">
        <div class="round-info" id="roundInfo">第 1 轮</div>
        <div class="deck-info" id="deckInfo">牌库剩余：185张</div>
    </div>

    <div class="players-area" id="playersArea"></div>

    <div class="my-area">
        <div class="my-info">
            <div>
                <span>我的状态牌：</span>
                <span id="myStatus">正常</span>
                <span id="statusCd" style="color:#999; margin-left:10px;"></span>
            </div>
            <div class="actions">行动力：<span id="actionsLeft">0</span></div>
            <button class="end-turn-btn" id="endTurnBtn" onclick="endTurn()" disabled>结束回合</button>
        </div>
        <div class="status-cards" id="statusCards"></div>
        <div class="hand-cards" id="handCards"></div>
    </div>

    <div class="log-area" id="logArea"></div>
    <button class="reset-btn" onclick="resetGame()">重置房间</button>
</div>

<!-- 防御弹窗 -->
<div class="modal-mask" id="defenseModal">
    <div class="modal">
        <h3 id="defenseTitle">你受到了攻击！</h3>
        <p>需要 <span id="needDef">1</span> 张【防】抵消</p>
        <div class="modal-btns" id="defenseBtns"></div>
    </div>
</div>

<!-- 背水一战弹窗 -->
<div class="modal-mask" id="beishuiModal">
    <div class="modal">
        <h3>背水一战</h3>
        <p>选择自损血量，换取更多手牌</p>
        <div class="modal-btns">
            <button class="modal-btn secondary" onclick="beishuiChoose(0)">不献祭</button>
            <button class="modal-btn" onclick="beishuiChoose(1)">自损1血 抽2张</button>
            <button class="modal-btn" onclick="beishuiChoose(2)">自损2血 抽3张</button>
            <button class="modal-btn" onclick="beishuiChoose(3)">自损3血 抽4张</button>
        </div>
    </div>
</div>

<!-- 暗度陈仓选项弹窗 -->
<div class="modal-mask" id="anduModal">
    <div class="modal">
        <h3>暗度陈仓</h3>
        <p>是否将【防】当作【攻】打出？</p>
        <div class="modal-btns">
            <button class="modal-btn secondary" onclick="closeAndu()">取消</button>
            <button class="modal-btn" onclick="confirmAndu()">当攻打出</button>
        </div>
    </div>
</div>

<script>
const socket = io();
let myIdx = -1;
let selectedTarget = -1;
let pendingCard = null;
let gameState = null;

// 大厅逻辑
function changeBot(delta) {
    let count = parseInt(document.getElementById('botCount').textContent);
    count = Math.max(0, Math.min(2, count + delta));
    document.getElementById('botCount').textContent = count;
    socket.emit('change_bot_count', {bot_count: count});
}

function joinGame() {
    const name = document.getElementById('playerName').value.trim() || '玩家';
    socket.emit('join_game', {name: name});
}

function resetGame() {
    if(confirm('确定重置房间吗？')) {
        socket.emit('reset_game');
    }
}

// 游戏状态更新
socket.on('game_update', function(data) {
    gameState = data;
    myIdx = data.my_idx;
    selectedTarget = -1;
    
    document.getElementById('lobby').style.display = 'none';
    document.getElementById('game').style.display = 'flex';
    
    // 顶部信息
    document.getElementById('roundInfo').textContent = `第 ${data.round} 轮`;
    document.getElementById('deckInfo').textContent = `牌库剩余：${data.deck_count}张`;
    document.getElementById('actionsLeft').textContent = data.actions_left;
    
    // 玩家列表
    renderPlayers(data.players, data.current_idx);
    
    // 我的手牌
    renderHandCards(data.my_cards);
    
    // 我的状态牌
    renderStatusCards(data.my_status_cards);
    
    // 我的状态
    document.getElementById('myStatus').textContent = data.my_status;
    if(data.players[myIdx].status_cooldown > 0) {
        document.getElementById('statusCd').textContent = `剩余 ${data.players[myIdx].status_cooldown} 回合`;
    } else {
        document.getElementById('statusCd').textContent = '';
    }
    
    // 结束回合按钮
    const endBtn = document.getElementById('endTurnBtn');
    if(data.current_idx === myIdx && !data.is_my_response && !data.is_beishui_prompt) {
        endBtn.disabled = false;
    } else {
        endBtn.disabled = true;
    }
    
    // 防御弹窗
    if(data.is_my_response) {
        showDefenseModal(data.pending_card, data.required_defenses);
    } else {
        document.getElementById('defenseModal').style.display = 'none';
    }
    
    // 背水一战弹窗
    if(data.is_beishui_prompt) {
        document.getElementById('beishuiModal').style.display = 'flex';
    } else {
        document.getElementById('beishuiModal').style.display = 'none';
    }
});

function renderPlayers(players, currentIdx) {
    const area = document.getElementById('playersArea');
    area.innerHTML = '';
    
    players.forEach((p, idx) => {
        if(idx === myIdx) return; // 自己不显示在上面
        
        const div = document.createElement('div');
        div.className = 'player-card';
        if(p.alive === false) div.classList.add('dead');
        if(idx === currentIdx) div.classList.add('current');
        if(idx === selectedTarget) div.classList.add('selected');
        
        const hpPercent = Math.max(0, (p.hp / p.max_hp) * 100);
        
        div.innerHTML = `
            <div class="player-name">${p.name}</div>
            <div class="hp-bar"><div class="hp-fill" style="width:${hpPercent}%"></div></div>
            <div class="hp-text">${p.hp} / ${p.max_hp}</div>
            <div class="faction">${p.faction}</div>
            ${p.status !== '正常' ? `<div class="status-tag">${p.status}</div>` : ''}
            <div class="hand-count">手牌：${p.hand_count}张</div>
        `;
        
        div.onclick = () => selectTarget(idx);
        area.appendChild(div);
    });
}

function selectTarget(idx) {
    if(gameState.current_idx !== myIdx) return;
    if(!gameState.players[idx].alive) return;
    selectedTarget = idx;
    renderPlayers(gameState.players, gameState.current_idx);
}

function renderHandCards(cards) {
    const area = document.getElementById('handCards');
    area.innerHTML = '';
    
    cards.forEach((card, i) => {
        const div = document.createElement('div');
        div.className = 'card';
        if(['攻','荆轲刺秦'].includes(card)) div.classList.add('attack');
        else if(['防','长城'].includes(card)) div.classList.add('defense');
        else div.classList.add('skill');
        
        div.textContent = card;
        div.onclick = () => playCard(card, i);
        area.appendChild(div);
    });
}

function renderStatusCards(cards) {
    const area = document.getElementById('statusCards');
    area.innerHTML = '';
    
    cards.forEach(card => {
        const div = document.createElement('div');
        div.className = 'status-card';
        div.textContent = card;
        div.onclick = () => equipStatus(card);
        area.appendChild(div);
    });
}

// 出牌
function playCard(card, index) {
    if(gameState.current_idx !== myIdx) return;
    if(gameState.is_my_response) return;
    
    const targetCards = ["攻", "荆轲刺秦", "一字马", "顺手牵羊", "江山易主", "同归于尽"];
    
    // 暗度陈仓：防当攻打
    if(card === '防' && gameState.my_status === '暗度陈仓') {
        pendingCard = card;
        document.getElementById('anduModal').style.display = 'flex';
        return;
    }
    
    if(targetCards.includes(card)) {
        if(selectedTarget === -1) {
            alert('请先点击目标玩家选中目标！');
            return;
        }
        socket.emit('play_card', {card: card, target: selectedTarget});
    } else {
        socket.emit('play_card', {card: card, target: -1});
    }
}

function closeAndu() {
    document.getElementById('anduModal').style.display = 'none';
    pendingCard = null;
}

function confirmAndu() {
    document.getElementById('anduModal').style.display = 'none';
    if(selectedTarget === -1) {
        alert('请先点击目标玩家选中目标！');
        return;
    }
    socket.emit('play_card', {card: '防', target: selectedTarget, intent: '攻'});
    pendingCard = null;
}

// 装备状态牌
function equipStatus(card) {
    if(gameState.current_idx !== myIdx) return;
    socket.emit('equip_status', {card: card});
}

// 结束回合
function endTurn() {
    socket.emit('end_turn');
}

// 防御弹窗
function showDefenseModal(cardName, need) {
    document.getElementById('defenseTitle').textContent = `对方打出了【${cardName}】！`;
    document.getElementById('needDef').textContent = need;
    
    const btns = document.getElementById('defenseBtns');
    btns.innerHTML = '';
    
    // 长城按钮
    if(gameState.my_cards.includes('长城')) {
        const btn = document.createElement('button');
        btn.className = 'modal-btn';
        btn.textContent = '祭出长城';
        btn.onclick = () => respond('长城');
        btns.appendChild(btn);
    }
    
    // 防按钮
    if(gameState.my_cards.includes('防') && ['攻','荆轲刺秦'].includes(cardName)) {
        const btn = document.createElement('button');
        btn.className = 'modal-btn secondary';
        btn.textContent = '出防';
        btn.onclick = () => respond('防');
        btns.appendChild(btn);
    }
    
    // 暗度陈仓：攻当防
    if(gameState.my_status === '暗度陈仓' && gameState.my_cards.includes('攻') && ['攻','荆轲刺秦'].includes(cardName)) {
        const btn = document.createElement('button');
        btn.className = 'modal-btn secondary';
        btn.textContent = '以攻代防';
        btn.onclick = () => respond('攻_as_防');
        btns.appendChild(btn);
    }
    
    // 放弃
    const btn = document.createElement('button');
    btn.className = 'modal-btn secondary';
    btn.textContent = '放弃防御';
    btn.onclick = () => respond('放弃');
    btns.appendChild(btn);
    
    document.getElementById('defenseModal').style.display = 'flex';
}

function respond(type) {
    socket.emit('respond_action', {type: type});
}

// 背水一战
function beishuiChoose(sac) {
    socket.emit('beishui_decision', {sacrifice: sac});
}

// 日志
socket.on('log', function(data) {
    const area = document.getElementById('logArea');
    const p = document.createElement('div');
    p.textContent = data.msg;
    area.appendChild(p);
    area.scrollTop = area.scrollHeight;
});

// 错误提示
socket.on('action_error', function(data) {
    alert(data.msg);
});

// 大厅更新
socket.on('lobby_update', function(data) {
    document.getElementById('lobbyInfo').textContent = `当前玩家：${data.count} / ${3 - data.bot_count}`;
});

// 强制刷新
socket.on('force_reload_all', function() {
    location.reload();
});

</script>
</body>
</html>
