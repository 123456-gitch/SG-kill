<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>三国kill · 最终修复版</title>
<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

<style>
body {
    margin:0;
    font-family: Arial;
    background:#111827;
    color:#fff;
}

/* 顶栏 */
header {
    background:#1f2937;
    padding:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

/* 玩家卡 */
.player {
    padding:10px;
    margin:5px;
    border:1px solid #374151;
    border-radius:8px;
}

.active {
    border:2px solid #fbbf24;
}

.dead {
    opacity:0.4;
}

/* 行动力提示 */
.ap {
    color:#34d399;
    font-weight:bold;
}

/* 按钮 */
button {
    margin:4px;
    padding:6px 10px;
    cursor:pointer;
}
</style>
</head>

<body>

<header>
    <div>三国Kill · FINAL</div>
    <div id="status"></div>
</header>

<div id="game"></div>

<script>
const socket = io();

let myId = null;
let selected = -1;

/* =========================
   选择目标
========================= */
function selectTarget(i){
    if(i === myId){
        alert("不能选自己");
        return;
    }
    selected = i;
}

/* =========================
   出牌
========================= */
function play(card){
    if(["攻","荆轲刺秦","顺手牵羊","江山易主","同归于尽"].includes(card)){
        if(selected === -1){
            alert("必须选目标");
            return;
        }
    }

    socket.emit("play_card",{
        card:card,
        target:selected
    });
}

/* =========================
   暗度陈仓
========================= */
function playSwap(card,mode){
    socket.emit("play_card",{
        card:card,
        target:selected,
        intent:mode
    });
}

/* =========================
   状态
========================= */
function equip(card){
    socket.emit("equip_status",{card});
}

/* =========================
   UI更新
========================= */
socket.on("game_update",data=>{

    myId = data.my_idx;

    let html = "";

    /* =========================
       顶部信息
    ========================= */
    document.getElementById("status").innerHTML =
        "轮:" + data.round +
        " 行动力:" + data.actions_left +
        " 当前:" + data.players[data.current_idx].name;

    /* =========================
       玩家列表
    ========================= */
    data.players.forEach(p=>{
        html += `
        <div class="player ${p.alive ? '' : 'dead'} ${p.idx==data.current_idx?'active':''}"
             onclick="selectTarget(${p.idx})">

            <b>${p.name}</b> (${p.faction})<br>
            ❤️${p.hp}/${p.max_hp}<br>
            状态:${p.status} (${p.status_cooldown})
        </div>`;
    });

    /* =========================
       手牌
    ========================= */
    html += "<hr>手牌：";

    data.my_cards.forEach(c=>{

        if(data.my_status==="暗度陈仓"){

            if(c==="攻"){
                html += `
                <button onclick="play('攻')">攻</button>
                <button onclick="playSwap('攻','防')">当防用</button>`;
            }

            else if(c==="防"){
                html += `
                <button disabled>防</button>
                <button onclick="playSwap('防','攻')">当攻用</button>`;
            }

            else{
                html += `<button onclick="play('${c}')">${c}</button>`;
            }

        }else{
            html += `<button onclick="play('${c}')">${c}</button>`;
        }
    });

    /* =========================
       状态牌
    ========================= */
    html += "<hr>状态牌：";

    data.my_status_cards.forEach(c=>{
        html += `<button onclick="equip('${c}')">${c}</button>`;
    });

    document.getElementById("game").innerHTML = html;
});

/* =========================
   错误提示
========================= */
socket.on("action_error",d=>{
    alert(d.msg);
});
</script>

</body>
</html>
