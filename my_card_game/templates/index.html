<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三国Kill - 全球联机决战端</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        /* 保持原有的UI设计，优化移动端表现 */
        body { background: #1a1a2e; color: #e2e8f0; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .main-container { flex: 1; display: flex; overflow: hidden; }
        .battle-zone { flex: 3; padding: 15px; overflow-y: auto; background: #1a1a2e; }
        #lobby { background: #1f4068; padding: 25px; border-radius: 12px; margin: auto; max-width: 400px; text-align: center; }
        .btn { padding: 12px 20px; background: #e43f5a; border: none; color: white; cursor: pointer; border-radius: 6px; width: 100%; margin-top: 10px; }
        .log-container { flex: 1; background: #0d0d18; padding: 10px; font-size: 12px; overflow-y: auto; color: #a0aec0; }
        /* 补充原有CSS样式... */
    </style>
</head>
<body>
    <div id="lobby">
        <h2>三国Kill联机大厅</h2>
        <input type="text" id="username" placeholder="请输入你的大名" style="width:100%; padding:10px; margin-bottom:10px;">
        <select id="bot-count" style="width:100%; padding:10px; margin-bottom:10px;">
            <option value="2">补2个人机</option>
            <option value="1">补1个人机</option>
            <option value="0">不要人机</option>
        </select>
        <button class="btn" onclick="joinGame()">加入对局</button>
        <button class="btn" style="background:#4a5568;" onclick="resetGame()">强制重置服务器</button>
    </div>

    <div id="game-board" style="display:none; height: 100%; flex-direction: column;">
        <!-- 游戏战场区，引用上述逻辑 -->
    </div>

    <script>
        // 核心联机配置：请将此处的 IP 换成你云服务器的公网 IP
        const SERVER_URL = "http://你的服务器公网IP:5000"; 
        const socket = io(SERVER_URL);

        function joinGame() {
            const name = document.getElementById("username").value;
            const bots = document.getElementById("bot-count").value;
            socket.emit('change_bot_count', { bot_count: parseInt(bots) });
            socket.emit('join_game', { name: name });
        }

        function resetGame() {
            socket.emit('reset_game');
            window.location.reload();
        }
        
        // ... 原有的 socket 监听和业务逻辑 ...
    </script>
</body>
</html>
